version: "3.9"

services:
app:
    build: .
    container_name: gobigblog_app
    restart: unless-stopped
    ports:
     - "3001:3001"
    env_file:
     - .env
    environment:
     # Override to point at local postgres & redis in this compose file
     DATABASE_URL: /
     REDIS_URL: redis://redis:6379
     NEXT_PUBLIC_PAYLOAD_URL: http://localhost:3001
     PORT: 3001
    depends_on:
     postgres:
        condition: service_healthy
     redis:
        condition: service_healthy
    volumes:
     - ./.env:/app/.env:ro

postgres:
    image: postgres:15-alpine
    container_name: gobigblog_postgres
    restart: unless-stopped
    ports:
     - "5432:5432"
    environment:
     POSTGRES_USER: gobig
     POSTGRES_PASSWORD: gobig
     POSTGRES_DB: gobig
    volumes:
     - pgdata:/var/lib/postgresql/data
    healthcheck:
     test: ["CMD-SHELL", "pg_isready -U gobig -d gobig || exit 1"]
     interval: 10s
     timeout: 5s
     retries: 5

redis:
    image: redis:7-alpine
    container_name: gobigblog_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
     - redisdata:/data
    healthcheck:
     test: ["CMD", "redis-cli", "ping"]
     interval: 10s
     timeout: 5s
     retries: 5

volumes:
pgdata:
redisdata: