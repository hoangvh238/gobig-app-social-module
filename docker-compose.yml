version: '3.8'

services:
  social-api:
    build: .
    container_name: gobig-social-api
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL must be set}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - APP_PORT=8001
    depends_on:
      - redis
    networks:
      - gobig-network

  redis:
    image: redis:7-alpine
    container_name: gobig-redis
    ports:
      - "6379:6379"
    networks:
      - gobig-network

networks:
  gobig-network:
    driver: bridge
